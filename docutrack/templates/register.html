<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | DocuTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- SHARED VARIABLES --- */
        :root {
            --bg-deep: #020408;
            --accent-primary: #00f2ff; 
            --text-white: #e6edf3;
            --text-gray: #8b949e;
            --border-color: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* --- BACKGROUND FX --- */
        .fixed-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 90%, rgba(112, 0, 255, 0.1), transparent 40%),
                radial-gradient(circle at 90% 10%, rgba(0, 242, 255, 0.05), transparent 40%);
            z-index: -1;
        }
        
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
            z-index: -1;
        }

        /* --- REGISTER CARD --- */
        .register-card {
            width: 100%;
            max-width: 650px;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .logo { 
            font-family: 'Space Grotesk'; 
            font-weight: 700; 
            font-size: 1.5rem; 
            color: #fff; 
            text-decoration: none; 
        }
        .logo span { color: var(--accent-primary); }

        /* --- ROLE TOGGLE --- */
        .role-switch {
            display: flex;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 2rem;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .role-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-gray);
            transition: all 0.3s;
        }

        .role-btn.active {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(0, 242, 255, 0.3);
            font-weight: 600;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1);
        }

        /* --- FORM GRID --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .full-width { grid-column: span 2; }

        .input-group { position: relative; }
        
        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-gray);
            font-family: 'Space Grotesk';
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: rgba(0, 242, 255, 0.02);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.05);
        }

        /* Messages */
        .messages {
            padding: 10px;
            margin-bottom: 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .messages.error {
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff4b4b;
        }
        .messages.success {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            color: #00ff9d;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-family: 'Space Grotesk';
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .form-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .form-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="fixed-bg"></div>
    <div class="grid-overlay"></div>

    <div class="register-card">
        <div class="header">
            <a href="{% url 'index' %}" class="logo">Docu<span>Track.</span></a>
            <p style="color: var(--text-gray); margin-top: 5px;">Secure Account Initialization</p>
        </div>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="messages {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="role-switch">
            <div class="role-btn active" id="btn-student" onclick="toggleRole('student')">Student</div>
            <div class="role-btn" id="btn-faculty" onclick="toggleRole('faculty')">Faculty</div>
        </div>

        <form action="{% url 'register' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="role" id="role-input" value="student">

            <div class="form-grid">
                <div class="input-group">
                    <label class="input-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="John" required>
                </div>

                <div class="input-group">
                    <label class="input-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Doe" required>
                </div>

                <div class="input-group">
                    <label class="input-label" id="id-label">User ID</label>
                    <input type="text" name="user_id" class="form-control" id="id-input" placeholder="CS202645" required>
                </div>

                <div class="input-group">
                    <label class="input-label">Institutional Email</label>
                    <input type="email" name="email" class="form-control" placeholder="user@college.edu" required>
                </div>

                <div class="input-group full-width">
                    <label class="input-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Register Student</button>
        </form>

        <div class="form-footer">
            <span>Already have an ID? <a href="{% url 'login' %}">Access System</a></span>
        </div>
    </div>

    <script>
        function toggleRole(role) {
            const btnStudent = document.getElementById('btn-student');
            const btnFaculty = document.getElementById('btn-faculty');
            const roleInput = document.getElementById('role-input');
            
            const idLabel = document.getElementById('id-label');
            const idInput = document.getElementById('id-input');
            const submitBtn = document.getElementById('submit-btn');

            if (role === 'student') {
                // UI Update
                btnStudent.classList.add('active');
                btnFaculty.classList.remove('active');
                
                // Form Update
                roleInput.value = 'student';
                idLabel.innerText = 'Student ID';
                idInput.placeholder = 'CS202645';
                submitBtn.innerText = 'Register Student';
            } else {
                // UI Update
                btnFaculty.classList.add('active');
                btnStudent.classList.remove('active');
                
                // Form Update
                roleInput.value = 'faculty';
                idLabel.innerText = 'Faculty ID';
                idInput.placeholder = 'FAC001';
                submitBtn.innerText = 'Register Faculty';
            }
        }
    </script>

</body>
</html>
